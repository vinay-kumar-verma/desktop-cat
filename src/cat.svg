<svg id="cat-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <filter id="ink-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1.5" dy="2" stdDeviation="1.5" flood-color="#0a0a0a" flood-opacity="0.6"/>
    </filter>
    <filter id="ink-shadow-sm" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0.8" dy="1" stdDeviation="0.8" flood-color="#0a0a0a" flood-opacity="0.5"/>
    </filter>
    <filter id="inky" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="steam-blur">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <radialGradient id="belly-grad" cx="50%" cy="60%" r="45%">
      <stop offset="0%" stop-color="#7a7a7a"/>
      <stop offset="100%" stop-color="#3a3a3a"/>
    </radialGradient>
  </defs>

  <!--
    STRUCTURE:
    #cat-body-group  — the entire cat, transform this for mochi squish/stretch
      #cat-tail      — tail, animates on idle
      #cat-body      — torso
      #cat-head-group — head + all head features, transform for eye-follow tilt
        #cat-ears
        #cat-face
          #cat-eyes-group
            #eye-left  / #eye-right  — full eye (whites + iris)
            #pupil-left / #pupil-right — MOVE THESE for eye-follow
          #cat-nose
          #cat-mouth
          #cat-whiskers
      #cat-paws-group
        #paw-left / #paw-right  — animate Y for kneading
    #cat-overlays  — steam, hearts, z-bubbles always on top
  -->

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- MAIN BODY GROUP — squish/stretch here for mochi drag -->
  <!-- ═══════════════════════════════════════════════════ -->
  <g id="cat-body-group" filter="url(#ink-shadow)">

    <!-- TAIL -->
    <g id="cat-tail">
      <path id="tail-path"
        d="M 44,62 Q 62,60 64,50 Q 66,40 58,38"
        fill="none" stroke="#1a1a1a" stroke-width="6"
        stroke-linecap="round"/>
      <path d="M 56,35 Q 62,33 60,39 Q 57,36 56,35 Z"
        fill="#1a1a1a"/>
    </g>

    <!-- BODY -->
    <ellipse id="cat-body"
      cx="40" cy="57" rx="18" ry="14"
      fill="#1a1a1a"/>
    <!-- Belly patch -->
    <ellipse id="cat-belly"
      cx="40" cy="58" rx="10" ry="8"
      fill="url(#belly-grad)" opacity="0.7"/>

    <!-- HEAD GROUP — rotate slightly for cursor tilt -->
    <g id="cat-head-group">

      <!-- EARS -->
      <g id="cat-ears">
        <!-- Left ear -->
        <polygon id="ear-left"
          points="22,30 18,14 30,22"
          fill="#1a1a1a"/>
        <polygon id="ear-left-inner"
          points="23,28 20,17 29,23"
          fill="#5a2a2a" opacity="0.6"/>
        <!-- Right ear -->
        <polygon id="ear-right"
          points="58,30 62,14 50,22"
          fill="#1a1a1a"/>
        <polygon id="ear-right-inner"
          points="57,28 60,17 51,23"
          fill="#5a2a2a" opacity="0.6"/>
      </g>

      <!-- HEAD base -->
      <circle id="cat-head"
        cx="40" cy="33" r="18"
        fill="#1a1a1a"/>

      <!-- Cheek puffs -->
      <ellipse id="cheek-left"  cx="24" cy="36" rx="5" ry="4" fill="#3a3a3a" opacity="0.8"/>
      <ellipse id="cheek-right" cx="56" cy="36" rx="5" ry="4" fill="#3a3a3a" opacity="0.8"/>

      <!-- FACE -->
      <g id="cat-face">

        <!-- EYES GROUP -->
        <g id="cat-eyes-group">

          <!-- LEFT EYE -->
          <g id="eye-left">
            <!-- Iris/sclera -->
            <ellipse id="iris-left"
              cx="31" cy="31" rx="7" ry="7"
              fill="#e8c547"/>
            <!-- Pupil — MOVE THIS for eye follow -->
            <ellipse id="pupil-left"
              cx="31" cy="31" rx="3.5" ry="4.5"
              fill="#0a0a0a"/>
            <!-- Shine -->
            <circle id="shine-left"
              cx="33" cy="29" r="1.5"
              fill="white" opacity="0.9"/>
          </g>

          <!-- RIGHT EYE -->
          <g id="eye-right">
            <ellipse id="iris-right"
              cx="49" cy="31" rx="7" ry="7"
              fill="#e8c547"/>
            <!-- Pupil — MOVE THIS for eye follow -->
            <ellipse id="pupil-right"
              cx="49" cy="31" rx="3.5" ry="4.5"
              fill="#0a0a0a"/>
            <circle id="shine-right"
              cx="51" cy="29" r="1.5"
              fill="white" opacity="0.9"/>
          </g>

          <!-- BLINK LIDS (hidden by default, shown on blink) -->
          <rect id="blink-left"
            x="24" y="28" width="14" height="7" rx="3"
            fill="#1a1a1a" display="none"/>
          <rect id="blink-right"
            x="42" y="28" width="14" height="7" rx="3"
            fill="#1a1a1a" display="none"/>

          <!-- SLEEPY LIDS (half-closed, shown when tired/sleeping) -->
          <rect id="sleepy-left"
            x="24" y="29" width="14" height="4" rx="2"
            fill="#1a1a1a" display="none"/>
          <rect id="sleepy-right"
            x="42" y="29" width="14" height="4" rx="2"
            fill="#1a1a1a" display="none"/>

          <!-- ANGRY BROWS -->
          <line id="brow-left"
            x1="24" y1="24" x2="36" y2="27"
            stroke="#1a1a1a" stroke-width="2.5"
            stroke-linecap="round" display="none"/>
          <line id="brow-right"
            x1="56" y1="24" x2="44" y2="27"
            stroke="#1a1a1a" stroke-width="2.5"
            stroke-linecap="round" display="none"/>

        </g>

        <!-- NOSE -->
        <polygon id="cat-nose"
          points="40,36 37,39 43,39"
          fill="#c97a7a"/>

        <!-- MOUTH -->
        <g id="cat-mouth">
          <path id="mouth-left"
            d="M 37,39 Q 35,42 33,41"
            fill="none" stroke="#c97a7a" stroke-width="1.2"
            stroke-linecap="round"/>
          <path id="mouth-right"
            d="M 43,39 Q 45,42 47,41"
            fill="none" stroke="#c97a7a" stroke-width="1.2"
            stroke-linecap="round"/>
        </g>

        <!-- WHISKERS -->
        <g id="cat-whiskers" opacity="0.7">
          <line x1="18" y1="37" x2="32" y2="38" stroke="#aaaaaa" stroke-width="0.8" stroke-linecap="round"/>
          <line x1="17" y1="39" x2="32" y2="39" stroke="#aaaaaa" stroke-width="0.8" stroke-linecap="round"/>
          <line x1="18" y1="41" x2="32" y2="40" stroke="#aaaaaa" stroke-width="0.8" stroke-linecap="round"/>
          <line x1="62" y1="37" x2="48" y2="38" stroke="#aaaaaa" stroke-width="0.8" stroke-linecap="round"/>
          <line x1="63" y1="39" x2="48" y2="39" stroke="#aaaaaa" stroke-width="0.8" stroke-linecap="round"/>
          <line x1="62" y1="41" x2="48" y2="40" stroke="#aaaaaa" stroke-width="0.8" stroke-linecap="round"/>
        </g>

      </g><!-- /cat-face -->
    </g><!-- /cat-head-group -->

    <!-- PAWS GROUP — animate translateY for kneading -->
    <g id="cat-paws-group">
      <g id="paw-left">
        <ellipse cx="28" cy="68" rx="8" ry="5" fill="#1a1a1a"/>
        <ellipse cx="24" cy="69" rx="3.5" ry="2.5" fill="#2a2a2a"/>
        <ellipse cx="28" cy="70" rx="3.5" ry="2.5" fill="#2a2a2a"/>
        <ellipse cx="32" cy="69" rx="3.5" ry="2.5" fill="#2a2a2a"/>
        <!-- Toe beans -->
        <circle cx="24" cy="68" r="1.5" fill="#c97a7a" opacity="0.6"/>
        <circle cx="28" cy="69" r="1.5" fill="#c97a7a" opacity="0.6"/>
        <circle cx="32" cy="68" r="1.5" fill="#c97a7a" opacity="0.6"/>
      </g>
      <g id="paw-right">
        <ellipse cx="52" cy="68" rx="8" ry="5" fill="#1a1a1a"/>
        <ellipse cx="48" cy="69" rx="3.5" ry="2.5" fill="#2a2a2a"/>
        <ellipse cx="52" cy="70" rx="3.5" ry="2.5" fill="#2a2a2a"/>
        <ellipse cx="56" cy="69" rx="3.5" ry="2.5" fill="#2a2a2a"/>
        <!-- Toe beans -->
        <circle cx="48" cy="68" r="1.5" fill="#c97a7a" opacity="0.6"/>
        <circle cx="52" cy="69" r="1.5" fill="#c97a7a" opacity="0.6"/>
        <circle cx="56" cy="68" r="1.5" fill="#c97a7a" opacity="0.6"/>
      </g>
    </g>

  </g><!-- /cat-body-group -->

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- OVERLAYS — always on top, independent of body group -->
  <!-- ═══════════════════════════════════════════════════ -->
  <g id="cat-overlays">

    <!-- Z bubbles (sleeping) -->
    <g id="z-bubbles" display="none">
      <text x="58" y="22" font-size="8" fill="#aaaaff" opacity="0.9"
        font-family="serif">z</text>
      <text x="63" y="15" font-size="11" fill="#aaaaff" opacity="0.7"
        font-family="serif">z</text>
      <text x="69" y="8" font-size="14" fill="#aaaaff" opacity="0.5"
        font-family="serif">Z</text>
    </g>

    <!-- Steam clouds (angry / overheat) -->
    <g id="steam-clouds" display="none" filter="url(#steam-blur)">
      <ellipse cx="33" cy="18" rx="5" ry="3" fill="#cccccc" opacity="0.8"/>
      <ellipse cx="40" cy="14" rx="6" ry="3.5" fill="#cccccc" opacity="0.7"/>
      <ellipse cx="47" cy="18" rx="5" ry="3" fill="#cccccc" opacity="0.8"/>
    </g>

    <!-- Heart bubble (hungry) -->
    <g id="heart-bubble" display="none">
      <text x="54" y="18" font-size="12" fill="#ff6b8a">♥</text>
    </g>

    <!-- Sweat drop (overheat / stressed) -->
    <g id="sweat-drop" display="none">
      <ellipse cx="58" cy="28" rx="3" ry="4" fill="#6af" opacity="0.8"/>
      <polygon points="58,24 55,28 61,28" fill="#6af" opacity="0.8"/>
    </g>

    <!-- Sneeze particles -->
    <g id="sneeze-particles" display="none">
      <circle cx="52" cy="42" r="2" fill="#aaddff" opacity="0.8"/>
      <circle cx="56" cy="38" r="1.5" fill="#aaddff" opacity="0.6"/>
      <circle cx="58" cy="44" r="1" fill="#aaddff" opacity="0.7"/>
    </g>

    <!-- Lick paw (shown during lick animation) -->
    <g id="lick-paw" display="none">
      <!-- Paw raised to face -->
      <ellipse cx="34" cy="38" rx="6" ry="4" fill="#1a1a1a"/>
      <!-- Tongue -->
      <ellipse id="tongue" cx="40" cy="40" rx="3" ry="2" fill="#ff9999"/>
    </g>

    <!-- Hunting focus marks (mouse hunt) -->
    <g id="hunt-marks" display="none">
      <line x1="26" y1="26" x2="22" y2="22" stroke="#e8c547" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="54" y1="26" x2="58" y2="22" stroke="#e8c547" stroke-width="1.5" stroke-linecap="round"/>
    </g>

  </g><!-- /cat-overlays -->

</svg>
