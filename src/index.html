<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
  <title>Desktop Cat</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Extra layout wiring */
    #cat-container {
      position: absolute;
      width: 160px;
      height: 160px;
      left: 0;
      top: 0;
      bottom: auto;
    }
    /* Speech bubble: floats above the cat */
    #bubble-wrapper {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      width: 140px;
      pointer-events: none;
      z-index: 10;
      margin-bottom: 4px;
    }
    #bubble-svg {
      overflow: visible;
      display: none;
    }
    /* Suspended: freeze all animations */
    body.suspended * {
      animation-play-state: paused !important;
    }
    /* Moonlight glow handled in styles.css */
    body {
      pointer-events: none;
    }
    #cat-container {
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="cat-container">

      <!-- Speech bubble sits above the SVG -->
      <div id="bubble-wrapper">
        <svg id="bubble-svg" xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 130 40" width="130" height="40">
          <rect id="bubble-rect"
                x="2" y="2" width="126" height="28" rx="9" ry="9"
                fill="#f5f2ee" stroke="#c4c0b8" stroke-width="1.2"/>
          <!-- Tail pointing down-center -->
          <polygon id="bubble-tail-poly"
                   points="52,30 65,40 78,30"
                   fill="#f5f2ee" stroke="#c4c0b8" stroke-width="1.2"
                   stroke-linejoin="round"/>
          <!-- Cover the top stroke of the tail so it blends -->
          <line x1="53" y1="30" x2="77" y2="30" stroke="#f5f2ee" stroke-width="2.5"/>
          <text id="bubble-text"
                x="65" y="17"
                text-anchor="middle"
                dominant-baseline="middle"
                font-size="8.5"
                font-family="'Segoe UI', 'SF Pro Text', system-ui, sans-serif"
                fill="#2a2a2a">...</text>
        </svg>
      </div>

      <!-- Cat SVG loaded inline by JS -->
      <div id="cat-svg-container"></div>

    </div>
  </div>

  <script>
    // Load SVG inline (Electron file:// allows this)
    async function loadCatSVG() {
      try {
        const resp = await fetch('./cat.svg');
        const svgText = await resp.text();
        document.getElementById('cat-svg-container').innerHTML = svgText;
      } catch (e) {
        // Minimal fallback
        document.getElementById('cat-svg-container').innerHTML =
          '<svg width="80" height="80" viewBox="0 0 80 80" id="cat-svg">' +
          '<circle cx="40" cy="40" r="30" fill="#1a1a1a"/>' +
          '<text x="40" y="46" text-anchor="middle" fill="#e8c547" font-size="20">🐱</text>' +
          '</svg>';
      }
    }
    document.addEventListener('DOMContentLoaded', loadCatSVG);
  </script>

  <script src="cat.js"></script>
</body>
</html>
